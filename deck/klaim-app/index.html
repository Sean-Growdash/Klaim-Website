<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Klaim — App Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" />
<style>
  :root{
    --ink:#2F196B; --ink-deep:#1F0F4A;
    --lime:#C7FF4F; --lime-deep:#A8E837;
    --cream:#F4EDE6; --cream-2:#EDE5DC; --cream-3:#E5DCD0;
    --pink:#FF6B9D; --white:#FFFFFF; --black:#15091F;
    --muted:rgba(47,25,107,.62); --hairline:rgba(47,25,107,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:#0a0612;color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(47,25,107,.6) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(199,255,79,.04) 0%, transparent 50%),
      #0a0612;
    padding:60px 20px;
  }
  h1,h2,h3,h4,.brico{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-.04em;line-height:.95;text-wrap:balance}

  /* Highlight (lime block) — used in headlines */
  .hl{display:inline-block;background:var(--lime);color:var(--ink);padding:0 .12em;border-radius:8px}
  .ink-bg .hl{background:var(--lime);color:var(--ink)}

  /* Stage */
  .stage{display:flex;justify-content:center;align-items:flex-start;gap:48px;flex-wrap:wrap}
  .stage-side{
    color:var(--cream);
    max-width:300px;
    padding-top:120px;
    font-family:'Inter',sans-serif;
  }
  .stage-side .eyebrow{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.2em;
    text-transform:uppercase;color:var(--lime);margin-bottom:16px;
    padding:6px 12px;border:1.5px solid var(--lime);border-radius:999px;
  }
  .stage-side h1{
    font-size:48px;color:var(--cream);line-height:.95;margin-bottom:16px;
  }
  .stage-side h1 .lime{color:var(--lime)}
  .stage-side p{
    font-size:14px;line-height:1.5;color:rgba(244,237,230,.7);font-weight:500;
  }
  .stage-side ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:24px;font-size:13px;color:rgba(244,237,230,.6)}
  .stage-side li{display:flex;gap:8px;font-weight:500}
  .stage-side li::before{content:"→";color:var(--lime);font-weight:700}

  /* Phone wrapper */
  .phone-wrap{
    display:flex;flex-direction:column;align-items:center;gap:20px;
  }
  .phone-shell{
    border-radius:54px;padding:6px;
    background:linear-gradient(160deg,#3a3344 0%,#0a0612 100%);
    box-shadow:0 50px 120px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04);
  }
  .tab-status{
    display:flex;gap:6px;align-items:center;justify-content:center;
    color:var(--cream);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    opacity:.5;
  }
  .tab-status .dot{width:6px;height:6px;border-radius:50%;background:var(--lime)}

  /* Inner app — base canvas */
  .app{
    width:100%;height:100%;
    background:var(--cream);
    color:var(--ink);
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .app.dark{background:var(--black);color:var(--cream)}

  /* Scrollable region */
  .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}

  /* Page header */
  .page-h{padding:8px 20px 0}
  .page-h .eyebrow{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink);opacity:.55;
  }
  .app.dark .page-h .eyebrow{color:rgba(244,237,230,.55)}
  .page-h h1{font-size:48px;margin-top:6px;line-height:.92}
  .page-h .sub{font-size:14px;color:var(--muted);font-weight:500;line-height:1.45;margin-top:10px;max-width:320px}
  .app.dark .page-h .sub{color:rgba(244,237,230,.65)}

  /* Section label */
  .sec-l{
    font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);padding:0 20px;margin-top:24px;margin-bottom:12px;
  }
  .app.dark .sec-l{color:rgba(244,237,230,.55)}

  /* Tab bar */
  .tabs{
    flex:none;
    background:var(--cream);
    border-top:1px solid var(--hairline);
    padding:8px 12px 22px;
    display:flex;justify-content:space-around;align-items:flex-end;gap:4px;
    position:relative;z-index:5;
  }
  .app.dark .tabs{background:var(--black);border-top-color:rgba(244,237,230,.08)}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:8px 4px;border:0;background:transparent;cursor:pointer;
    color:var(--muted);
    transition:transform .12s ease;
  }
  .tab:hover{color:var(--ink)}
  .app.dark .tab{color:rgba(244,237,230,.5)}
  .app.dark .tab:hover{color:var(--cream)}
  .tab .ic{
    width:44px;height:32px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .tab.active{color:var(--ink)}
  .app.dark .tab.active{color:var(--cream)}
  .tab.active .ic{background:var(--lime)}
  .app.dark .tab.active .ic{background:var(--lime)}
  .tab.active .ic svg path,
  .tab.active .ic svg circle,
  .tab.active .ic svg polyline,
  .tab.active .ic svg line,
  .tab.active .ic svg rect{stroke:var(--ink)}
  .tab .lab{font-size:10px;font-weight:700;letter-spacing:.04em}

  /* Buttons */
  .btn{
    appearance:none;border:0;cursor:pointer;
    font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
    border-radius:999px;padding:14px 22px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--ink);color:var(--cream)}
  .btn-lime{background:var(--lime);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .app.dark .btn-ghost{color:var(--cream);border-color:var(--cream)}
  .btn-pink{background:var(--pink);color:var(--ink)}
  .btn-block{width:100%}

  /* Card primitives */
  .card{
    background:var(--white);border:1.5px solid var(--ink);border-radius:20px;
    padding:18px;display:flex;flex-direction:column;gap:8px;
  }
  .app.dark .card{background:#1a0e2a;border-color:rgba(199,255,79,.15)}
  .card.lime{background:var(--lime);border-color:var(--ink);color:var(--ink)}
  .card.ink{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .card.pink{background:var(--pink);color:var(--ink);border-color:var(--ink)}
  .card.cream2{background:var(--cream-2);border-color:var(--ink)}

  /* Pill / chip */
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 11px;border-radius:999px;
    font-size:11px;font-weight:700;letter-spacing:.04em;
    border:1.5px solid var(--ink);background:var(--cream);color:var(--ink);
    text-transform:uppercase;
  }
  .pill.lime{background:var(--lime)}
  .pill.ink{background:var(--ink);color:var(--lime);border-color:var(--ink)}
  .pill.pink{background:var(--pink);color:var(--ink)}
  .pill.amber{background:#FFD66B;color:var(--ink)}
  .pill.ghost{background:transparent}
  .app.dark .pill{background:transparent;color:var(--cream);border-color:rgba(244,237,230,.4)}
  .app.dark .pill.lime{background:var(--lime);color:var(--ink);border-color:var(--ink)}
  .app.dark .pill.ink{background:var(--ink);color:var(--lime);border-color:var(--lime)}
  .app.dark .pill.amber{background:#FFD66B;color:var(--ink);border-color:var(--ink)}

  /* Photo placeholder */
  .photo{
    background:
      repeating-linear-gradient(135deg, rgba(47,25,107,.06) 0 8px, transparent 8px 16px),
      var(--cream-3);
    border:1.5px solid var(--ink);border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    position:relative;overflow:hidden;
  }
  .photo::after{
    content:"PHOTO";position:relative;z-index:1;
  }
  .photo.dark{
    background:
      repeating-linear-gradient(135deg, rgba(244,237,230,.04) 0 8px, transparent 8px 16px),
      #251339;
    border-color:rgba(199,255,79,.2);color:rgba(244,237,230,.4);
  }
  .app.dark .photo{
    background:
      repeating-linear-gradient(135deg, rgba(244,237,230,.04) 0 8px, transparent 8px 16px),
      #251339;
    border-color:rgba(199,255,79,.2);color:rgba(244,237,230,.4);
  }

  /* Avatars */
  .av{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    border:1.5px solid var(--ink);font-size:14px;letter-spacing:-.02em;flex:none;
  }
  .av.lime{background:var(--lime);color:var(--ink)}
  .av.pink{background:var(--pink);color:var(--ink)}
  .av.ink{background:var(--ink);color:var(--lime)}
  .av.cream{background:var(--cream-2);color:var(--ink)}

  /* Modal */
  .modal-wrap{
    position:absolute;inset:0;z-index:100;
    display:flex;align-items:flex-end;justify-content:center;
    background:rgba(15,9,31,.55);backdrop-filter:blur(4px);
    animation:fade .2s ease;
  }
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal{
    background:var(--cream);color:var(--ink);
    border-top-left-radius:28px;border-top-right-radius:28px;
    width:100%;max-height:88%;overflow-y:auto;
    padding:24px 20px 32px;
    animation:slideUp .25s cubic-bezier(.2,.8,.2,1);
    border-top:1.5px solid var(--ink);
    scrollbar-width:none;
  }
  .modal::-webkit-scrollbar{display:none}
  .app.dark .modal{background:#1a0e2a;color:var(--cream);border-top-color:rgba(199,255,79,.2)}
  .modal-grip{
    width:44px;height:5px;border-radius:99px;background:var(--ink);opacity:.25;
    margin:0 auto 18px;
  }
  .app.dark .modal-grip{background:var(--cream);opacity:.3}
  .modal h2{font-size:32px;margin-bottom:8px}
  .modal .sub{font-size:14px;color:var(--muted);font-weight:500;line-height:1.5;margin-bottom:20px}
  .app.dark .modal .sub{color:rgba(244,237,230,.65)}

  /* Tab pane fade */
  @keyframes paneFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .pane{animation:paneFade .25s ease;flex:1;display:flex;flex-direction:column;min-height:0}

  /* === DROPS variants === */

  /* shared header for drops */
  .countdown{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--ink);color:var(--cream);
    padding:8px 14px;border-radius:999px;
    font-size:13px;font-weight:600;
  }
  .countdown .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(199,255,79,.2)}
  .countdown b{color:var(--lime);font-weight:700;letter-spacing:.02em}

  /* CARDS variant — bold trading-card grid */
  .drop-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;
  }
  .drop-card{
    border:1.5px solid var(--ink);border-radius:18px;overflow:hidden;
    background:var(--white);position:relative;
    display:flex;flex-direction:column;
    cursor:pointer;
  }
  .app.dark .drop-card{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .drop-card .img-wrap{aspect-ratio:1/.85;position:relative}
  .drop-card .photo{border:0;border-radius:0;border-bottom:1.5px solid var(--ink);height:100%;width:100%}
  .app.dark .drop-card .photo{border-bottom-color:rgba(199,255,79,.2)}
  .drop-card .badge-wrap{position:absolute;top:8px;right:8px;display:flex;gap:4px}
  .drop-card .body{padding:12px 12px 14px;display:flex;flex-direction:column;gap:4px}
  .drop-card .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.02em;line-height:1.05}
  .drop-card .price{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.03em;line-height:1;margin-top:4px;white-space:nowrap}
  .drop-card .price.lime{color:var(--ink);background:var(--lime);display:inline-block;padding:1px 6px;border-radius:6px;align-self:flex-start;white-space:nowrap}
  .drop-card .min{font-size:11px;color:var(--muted);font-weight:600}
  .app.dark .drop-card .min{color:rgba(244,237,230,.6)}

  /* EDITORIAL variant — stack with big imagery */
  .ed-stack{display:flex;flex-direction:column;gap:12px;padding:0 20px}
  .ed-card{
    border:1.5px solid var(--ink);border-radius:22px;overflow:hidden;
    background:var(--white);position:relative;cursor:pointer;
  }
  .app.dark .ed-card{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .ed-card .photo{border:0;border-radius:0;height:160px;width:100%;border-bottom:1.5px solid var(--ink)}
  .app.dark .ed-card .photo{border-bottom-color:rgba(199,255,79,.2)}
  .ed-card .body{padding:14px 16px 16px;display:flex;align-items:flex-end;gap:12px;justify-content:space-between}
  .ed-card .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em;line-height:1}
  .ed-card .min{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
  .ed-card .amt{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:32px;letter-spacing:-.04em;line-height:.85;color:var(--ink)}
  .ed-card .amt small{font-size:13px;font-weight:500;color:var(--muted);display:block;margin-top:2px;letter-spacing:0}
  .app.dark .ed-card .amt{color:var(--lime)}
  .app.dark .ed-card .min,
  .app.dark .ed-card .amt small{color:rgba(244,237,230,.6)}
  .ed-card .badge-wrap{position:absolute;top:10px;right:10px;display:flex;gap:4px}

  /* RECEIPTS variant — voucher with perforated edge */
  .rc-stack{display:flex;flex-direction:column;gap:14px;padding:0 20px}
  .rc-card{
    border:1.5px solid var(--ink);border-radius:14px;
    background:var(--cream-2);position:relative;cursor:pointer;
    display:flex;align-items:stretch;overflow:hidden;
  }
  .app.dark .rc-card{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .rc-card .left{flex:none;width:88px;display:flex;align-items:stretch;padding:0;overflow:hidden}
  .rc-card .photo{height:100%;width:100%;border-radius:0;border:none;font-size:9px}
  .rc-card .perf{
    flex:none;width:1.5px;
    background-image:linear-gradient(to bottom, var(--ink) 50%, transparent 50%);
    background-size:1.5px 8px;background-repeat:repeat-y;
    position:relative;
  }
  .app.dark .rc-card .perf{background-image:linear-gradient(to bottom, rgba(199,255,79,.4) 50%, transparent 50%)}
  .rc-card .perf::before, .rc-card .perf::after{
    content:"";position:absolute;width:14px;height:14px;border-radius:50%;
    background:var(--cream);border:1.5px solid var(--ink);
    left:-7.5px;
  }
  .app.dark .rc-card .perf::before, .app.dark .rc-card .perf::after{background:var(--black);border-color:rgba(199,255,79,.2)}
  .rc-card .perf::before{top:-7.5px}
  .rc-card .perf::after{bottom:-7.5px}
  .rc-card .body{flex:1;padding:14px 14px 14px 16px;display:flex;flex-direction:column;justify-content:center;gap:2px}
  .rc-card .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.02em;line-height:1}
  .rc-card .terms{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
  .app.dark .rc-card .terms{color:rgba(244,237,230,.6)}
  .rc-card .right{flex:none;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:14px 16px;gap:4px;text-align:right}
  .rc-card .amt{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;letter-spacing:-.04em;line-height:.85;color:var(--ink)}
  .app.dark .rc-card .amt{color:var(--lime)}
  .rc-card .lab{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em}

  /* Banner (cashback notice / drop-buddies) */
  .banner{
    margin:14px 20px 0;border:1.5px solid var(--ink);border-radius:16px;
    background:var(--lime);padding:14px 16px;
    display:flex;align-items:center;gap:12px;
  }
  .banner.ink{background:var(--ink);color:var(--cream)}
  .banner.ink .arr{background:var(--lime);color:var(--ink)}
  .banner .arr{
    margin-left:auto;flex:none;width:32px;height:32px;border-radius:50%;
    background:var(--ink);color:var(--lime);
    display:flex;align-items:center;justify-content:center;font-weight:700;
  }
  .banner .body{font-size:13px;font-weight:600;line-height:1.3}
  .banner .body b{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.02em;display:block;margin-bottom:1px}
  .banner.ink .body b{color:var(--lime)}

  /* List rows */
  .row-list{display:flex;flex-direction:column;gap:10px;padding:0 20px}
  .row{
    display:flex;align-items:center;gap:12px;
    padding:14px;border:1.5px solid var(--ink);border-radius:16px;background:var(--white);
  }
  .app.dark .row{background:#1a0e2a;border-color:rgba(199,255,79,.15)}
  .row .ph-sm{width:48px;height:48px;border-radius:11px;font-size:9px;flex:none}
  .row .info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .row .info .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.02em}
  .row .info .det{font-size:12px;color:var(--muted);font-weight:500}
  .app.dark .row .info .det{color:rgba(244,237,230,.6)}
  .row .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none;white-space:nowrap}
  .row .right .amt{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.03em;color:var(--ink);white-space:nowrap}
  .app.dark .row .right .amt{color:var(--lime)}
  .row .right .lab{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em}

  /* Stats row */
  .stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:0;
    margin:0 20px;border:1.5px solid var(--ink);border-radius:16px;overflow:hidden;
    background:var(--white);
  }
  .app.dark .stats{background:#1a0e2a;border-color:rgba(199,255,79,.15)}
  .stat-c{padding:18px 12px;text-align:center;border-right:1px solid var(--hairline)}
  .stat-c:last-child{border-right:0}
  .app.dark .stat-c{border-right-color:rgba(244,237,230,.1)}
  .stat-c .v{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:28px;letter-spacing:-.04em;line-height:.9}
  .stat-c .k{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
  .app.dark .stat-c .k{color:rgba(244,237,230,.6)}

  /* Friend row */
  .feed{display:flex;flex-direction:column;padding:0 20px;gap:0}
  .feed-row{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--hairline);align-items:flex-start}
  .feed-row:last-child{border-bottom:0}
  .app.dark .feed-row{border-bottom-color:rgba(244,237,230,.08)}
  .feed-row .body{flex:1;min-width:0}
  .feed-row .body .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.02em}
  .feed-row .body .act{font-size:13px;color:var(--muted);font-weight:500;margin-top:1px}
  .app.dark .feed-row .body .act{color:rgba(244,237,230,.65)}
  .feed-row .body .badges{display:flex;gap:6px;margin-top:8px}
  .feed-row .meta{font-size:11px;color:var(--muted);font-weight:600;flex:none}
  .app.dark .feed-row .meta{color:rgba(244,237,230,.5)}

  /* Brand chip */
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 20px}
  .b-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 14px;
    border:1.5px solid var(--ink);border-radius:999px;
    font-size:13px;font-weight:600;background:var(--white);
  }
  .app.dark .b-chip{background:#1a0e2a;border-color:rgba(199,255,79,.2);color:var(--cream)}
  .b-chip .x{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;color:var(--muted);font-size:12px}
  .app.dark .b-chip .x{color:rgba(244,237,230,.6)}
  .b-chip .ph-xs{width:22px;height:22px;border-radius:6px;font-size:7px}

  /* Profile header */
  .profile-h{
    background:var(--ink);color:var(--cream);
    padding:32px 20px 28px;
    border-radius:0 0 32px 32px;position:relative;overflow:hidden;
    margin-bottom:24px;
  }
  .profile-h::before{
    content:"";position:absolute;top:-40%;right:-20%;width:60%;height:80%;
    background:radial-gradient(circle, rgba(199,255,79,.15) 0%, transparent 60%);
    pointer-events:none;
  }
  .profile-h .av{
    width:72px;height:72px;font-size:24px;
    background:var(--lime);color:var(--ink);border-color:var(--lime);
    margin-bottom:14px;
  }
  .profile-h .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:32px;letter-spacing:-.03em;line-height:1}
  .profile-h .handle{font-size:14px;color:rgba(244,237,230,.6);font-weight:500;margin-top:4px}
  .profile-h .badges{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
  .profile-h .badges .pill{background:transparent;color:var(--lime);border-color:var(--lime)}

  /* Toggle */
  .toggle-row{
    display:flex;align-items:center;gap:14px;padding:14px 16px;
    background:var(--white);border:1.5px solid var(--ink);border-radius:16px;
    margin:0 20px;
  }
  .app.dark .toggle-row{background:#1a0e2a;border-color:rgba(199,255,79,.15)}
  .toggle-row .info{flex:1}
  .toggle-row .info .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.02em}
  .toggle-row .info .det{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
  .app.dark .toggle-row .info .det{color:rgba(244,237,230,.6)}
  .toggle{
    appearance:none;border:0;cursor:pointer;
    width:50px;height:30px;border-radius:99px;background:var(--cream-3);
    border:1.5px solid var(--ink);position:relative;transition:background .15s ease;
    flex:none;
  }
  .toggle::after{
    content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;
    background:var(--ink);transition:transform .15s ease;
  }
  .toggle.on{background:var(--lime)}
  .toggle.on::after{transform:translateX(20px)}

  /* Trade swap visual */
  .swap-vis{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 0}
  .swap-vis .ph-sm{width:64px;height:64px;border-radius:14px;font-size:10px}
  .swap-vis .arr{
    width:36px;height:36px;border-radius:50%;background:var(--ink);color:var(--lime);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;
    flex:none;
  }

  /* Drop detail (sheet) */
  .detail-hero{
    height:200px;width:100%;border-radius:0;
    border:0;border-bottom:1.5px solid var(--ink);
    background:
      repeating-linear-gradient(135deg, rgba(47,25,107,.06) 0 8px, transparent 8px 16px),
      var(--cream-3);
    display:flex;align-items:flex-end;justify-content:flex-start;padding:16px;
    color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    position:relative;
  }
  .app.dark .detail-hero{
    background:repeating-linear-gradient(135deg, rgba(244,237,230,.04) 0 8px, transparent 8px 16px),#251339;
    border-bottom-color:rgba(199,255,79,.2);color:rgba(244,237,230,.4);
  }
  .detail-hero .badges{position:absolute;top:14px;left:14px;display:flex;gap:6px}

  /* Step row (how it works) */
  .step-row{display:flex;gap:12px;padding:8px 0}
  .step-row .n{
    flex:none;width:28px;height:28px;border-radius:50%;background:var(--ink);color:var(--lime);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:14px;
  }
  .step-row .t{font-size:13px;font-weight:500;line-height:1.4;color:var(--muted)}
  .app.dark .step-row .t{color:rgba(244,237,230,.7)}
  .step-row .t b{color:var(--ink);font-weight:700}
  .app.dark .step-row .t b{color:var(--cream)}

  /* Celebration overlay */
  .celebrate{
    position:absolute;inset:0;z-index:200;
    background:var(--ink);color:var(--cream);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;text-align:center;
    animation:fade .25s ease;
  }
  .celebrate .big{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:120px;letter-spacing:-.05em;line-height:.85;color:var(--lime);
  }
  .celebrate .lab{
    font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:rgba(244,237,230,.6);margin-top:8px;
  }
  .celebrate h2{
    font-size:36px;color:var(--cream);margin-top:32px;line-height:1;
  }
  .celebrate h2 .lime{color:var(--lime)}
  .celebrate p{font-size:14px;color:rgba(244,237,230,.7);font-weight:500;line-height:1.5;margin-top:12px;max-width:280px}

  /* === Curated rail === */
  .cur-rail{
    display:flex;gap:12px;padding:0 20px 4px;overflow-x:auto;
    scroll-snap-type:x mandatory;scrollbar-width:none;
    margin-bottom:4px;
  }
  .cur-rail::-webkit-scrollbar{display:none}
  .cur-card{
    flex:none;width:230px;
    border:1.5px solid var(--ink);border-radius:18px;
    background:var(--white);overflow:hidden;cursor:pointer;
    scroll-snap-align:start;
    display:flex;flex-direction:column;
    transition:transform .12s ease;
  }
  .cur-card:active{transform:scale(.98)}
  .app.dark .cur-card{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .cur-card.hero{width:260px;background:var(--lime)}
  .app.dark .cur-card.hero{background:var(--lime);color:var(--ink)}
  .cur-photo{
    position:relative;height:130px;
    background:
      repeating-linear-gradient(135deg, rgba(47,25,107,.06) 0 8px, transparent 8px 16px),
      var(--cream-3);
    border-bottom:1.5px solid var(--ink);
  }
  .app.dark .cur-card:not(.hero) .cur-photo{
    background:repeating-linear-gradient(135deg, rgba(244,237,230,.04) 0 8px, transparent 8px 16px),#251339;
    border-bottom-color:rgba(199,255,79,.2);
  }
  .cur-card.hero .cur-photo{height:150px}
  .cur-tag{
    position:absolute;top:10px;left:10px;
    background:var(--ink);color:var(--lime);
    padding:5px 10px;border-radius:999px;
    font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  }
  .cur-card.hero .cur-tag{background:var(--ink);color:var(--lime)}
  .cur-match{
    position:absolute;bottom:10px;right:10px;
    background:var(--cream);color:var(--ink);
    border:1.5px solid var(--ink);
    padding:4px 10px;border-radius:999px;
    font-size:10px;font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .cur-match .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 2px var(--ink)}
  .cur-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .cur-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .cur-nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.02em;line-height:1.05}
  .cur-meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
  .cur-card.hero .cur-meta{color:rgba(47,25,107,.7)}
  .app.dark .cur-card:not(.hero) .cur-meta{color:rgba(244,237,230,.6)}
  .cur-amt{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:22px;letter-spacing:-.04em;line-height:.9;
    color:var(--ink);white-space:nowrap;
  }
  .app.dark .cur-card:not(.hero) .cur-amt{color:var(--lime)}
  .cur-foot{
    display:flex;align-items:center;gap:7px;
    font-size:11px;font-weight:600;color:var(--muted);
    padding-top:6px;border-top:1px dashed rgba(47,25,107,.2);
  }
  .cur-card.hero .cur-foot{color:rgba(47,25,107,.7);border-top-color:rgba(47,25,107,.25)}
  .app.dark .cur-card:not(.hero) .cur-foot{color:rgba(244,237,230,.6);border-top-color:rgba(244,237,230,.15)}
  .cur-dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}

  /* === Search bar === */
  .search-bar{
    display:flex;gap:8px;padding:0 20px;margin-top:0;
  }
  .search-input{
    flex:1;display:flex;align-items:center;gap:10px;
    padding:0 14px;height:46px;
    background:var(--white);border:1.5px solid var(--ink);border-radius:14px;
    color:var(--ink);
  }
  .app.dark .search-input{background:#1a0e2a;border-color:rgba(199,255,79,.2);color:var(--cream)}
  .search-input input{
    flex:1;border:0;background:transparent;outline:0;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
    color:inherit;
  }
  .search-input input::placeholder{color:var(--muted)}
  .app.dark .search-input input::placeholder{color:rgba(244,237,230,.5)}
  .search-clear{
    appearance:none;border:0;background:var(--cream-3);
    width:22px;height:22px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--ink);
  }
  .app.dark .search-clear{background:rgba(244,237,230,.15);color:var(--cream)}
  .filter-btn{
    appearance:none;cursor:pointer;flex:none;
    width:46px;height:46px;border-radius:14px;
    background:var(--white);border:1.5px solid var(--ink);color:var(--ink);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .app.dark .filter-btn{background:#1a0e2a;border-color:rgba(199,255,79,.2);color:var(--cream)}
  .filter-btn.active{background:var(--ink);color:var(--lime)}
  .app.dark .filter-btn.active{background:var(--lime);color:var(--ink);border-color:var(--lime)}
  .filter-badge{
    position:absolute;top:-4px;right:-4px;
    width:18px;height:18px;border-radius:50%;
    background:var(--pink);color:var(--ink);
    border:1.5px solid var(--ink);
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:10px;
    display:flex;align-items:center;justify-content:center;
  }

  /* === Cuisine rail === */
  .cuisine-rail{
    display:flex;gap:6px;padding:14px 20px 4px;
    overflow-x:auto;scrollbar-width:none;
  }
  .cuisine-rail::-webkit-scrollbar{display:none}
  .cuisine-chip{
    appearance:none;cursor:pointer;flex:none;
    padding:8px 14px;border-radius:999px;
    border:1.5px solid var(--ink);
    background:transparent;color:var(--ink);
    font-family:'Inter',sans-serif;font-weight:600;font-size:13px;
    transition:all .12s ease;
  }
  .app.dark .cuisine-chip{border-color:rgba(244,237,230,.3);color:var(--cream)}
  .cuisine-chip.active{background:var(--ink);color:var(--cream)}
  .app.dark .cuisine-chip.active{background:var(--lime);color:var(--ink);border-color:var(--lime)}

  /* === Quick filter chips === */
  .quick-row{padding:10px 20px 0;display:flex;align-items:center;gap:10px}
  .quick-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .q-chip{
    appearance:none;cursor:pointer;
    padding:6px 12px;border-radius:999px;
    border:1.5px dashed rgba(47,25,107,.35);
    background:transparent;color:var(--ink);
    font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
    transition:all .12s ease;
  }
  .app.dark .q-chip{border-color:rgba(244,237,230,.25);color:rgba(244,237,230,.85)}
  .q-chip.on{
    background:var(--lime);color:var(--ink);
    border:1.5px solid var(--ink);border-style:solid;
  }
  .app.dark .q-chip.on{border-color:var(--ink)}

  /* === Sort row === */
  .sort-row{
    padding:14px 20px 8px;
    display:flex;align-items:center;
    border-bottom:1px solid var(--hairline);
    margin-bottom:14px;
    overflow-x:auto;scrollbar-width:none;
    gap:14px;
  }
  .app.dark .sort-row{border-bottom-color:rgba(244,237,230,.08)}
  .sort-row::-webkit-scrollbar{display:none}
  .sort-pills{display:flex;gap:14px;align-items:center}
  .sort-pill{
    appearance:none;cursor:pointer;border:0;background:transparent;
    font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
    color:var(--muted);
    padding:4px 0;
    border-bottom:2px solid transparent;
    white-space:nowrap;
    text-transform:uppercase;letter-spacing:.08em;
  }
  .app.dark .sort-pill{color:rgba(244,237,230,.55)}
  .sort-pill.on{color:var(--ink);border-bottom-color:var(--ink)}
  .app.dark .sort-pill.on{color:var(--lime);border-bottom-color:var(--lime)}

  /* Filter sheet sliders */
  .filter-block{
    border-top:1px solid var(--hairline);padding:18px 0 6px;
  }
  .app.dark .filter-block{border-top-color:rgba(244,237,230,.08)}
  .filter-block:first-of-type{border-top:0;padding-top:6px}
  .filter-h{
    display:flex;align-items:center;justify-content:space-between;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;
    letter-spacing:-.02em;
  }
  .filter-h b{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    background:var(--lime);color:var(--ink);
    padding:2px 8px;border-radius:6px;font-size:13px;
  }
  .rng{
    -webkit-appearance:none;appearance:none;
    width:100%;height:4px;background:var(--cream-3);border-radius:99px;
    outline:none;margin-top:14px;
  }
  .app.dark .rng{background:rgba(244,237,230,.15)}
  .rng::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:22px;height:22px;border-radius:50%;
    background:var(--lime);border:1.5px solid var(--ink);cursor:pointer;
  }
  .rng::-moz-range-thumb{
    width:22px;height:22px;border-radius:50%;
    background:var(--lime);border:1.5px solid var(--ink);cursor:pointer;
  }

  /* Empty state */
  .empty{
    padding:48px 20px;text-align:center;
    display:flex;flex-direction:column;align-items:center;
  }
  .empty-glyph{
    width:64px;height:64px;border-radius:50%;
    border:1.5px dashed var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bricolage Grotesque',sans-serif;font-size:32px;color:var(--muted);
    margin-bottom:16px;
  }
  .app.dark .empty-glyph{border-color:rgba(244,237,230,.3);color:rgba(244,237,230,.5)}
  .empty-h{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:18px;
    letter-spacing:-.02em;
  }

  /* Pending klaims */
  .pending-row{
    background:linear-gradient(180deg, rgba(199,255,79,.18) 0%, var(--white) 100%);
    border-style:dashed;
  }
  .app.dark .pending-row{
    background:linear-gradient(180deg, rgba(199,255,79,.08) 0%, #1a0e2a 100%);
    border-style:dashed;
  }
  .pending-meta{
    display:inline-flex;align-items:center;gap:6px;margin-top:6px;
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    color:var(--ink);
  }
  .app.dark .pending-meta{color:var(--lime)}
  .pending-dot{
    width:6px;height:6px;border-radius:50%;background:var(--pink);
    box-shadow:0 0 0 3px rgba(255,107,157,.25);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .amt-pending{
    background:var(--lime);color:var(--ink) !important;
    padding:2px 8px;border-radius:6px;
  }

  /* === Referral hero === */
  .ref-hero{
    margin:8px 20px 0;
    border:1.5px solid var(--ink);border-radius:22px;
    background:var(--ink);color:var(--cream);
    padding:18px 18px 16px;position:relative;overflow:hidden;
  }
  .ref-hero::before{
    content:"";position:absolute;top:-30%;right:-10%;width:60%;height:80%;
    background:radial-gradient(circle, rgba(199,255,79,.25) 0%, transparent 60%);
    pointer-events:none;
  }
  .ref-tag{
    display:inline-flex;align-items:center;gap:8px;
    font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    color:var(--lime);
    padding:5px 11px;border:1.5px solid var(--lime);border-radius:999px;
  }
  .ref-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(199,255,79,.2)}
  .ref-amounts{
    display:flex;align-items:center;gap:10px;
    margin-top:14px;position:relative;z-index:1;
  }
  .ref-amt-block{
    flex:1;background:var(--lime);color:var(--ink);
    border:1.5px solid var(--lime);border-radius:16px;
    padding:14px 12px;text-align:center;
  }
  .ref-amt{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:42px;letter-spacing:-.05em;line-height:.85;
  }
  .ref-amt-lab{
    font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    margin-top:6px;opacity:.8;
  }
  .ref-plus{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:28px;
    color:var(--lime);
  }
  .ref-headline{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:24px;letter-spacing:-.03em;line-height:1.05;
    margin-top:16px;color:var(--cream);
  }
  .ref-hl{
    background:var(--lime);color:var(--ink);
    padding:0 .15em;border-radius:6px;
  }
  .ref-fine{
    font-size:12px;font-weight:500;color:rgba(244,237,230,.7);
    line-height:1.4;margin-top:8px;
  }
  .ref-cta-row{
    display:flex;gap:8px;margin-top:14px;
  }
  .ref-copy{
    flex:none;background:transparent;color:var(--lime);
    border:1.5px dashed var(--lime);
    padding:14px 16px;
  }
  .ref-progress{
    margin-top:14px;padding-top:14px;
    border-top:1px dashed rgba(244,237,230,.18);
  }
  .ref-prog-row{
    display:flex;align-items:center;justify-content:space-between;
    font-size:12px;font-weight:600;color:rgba(244,237,230,.75);
  }
  .ref-prog-row b{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;color:var(--cream);
    font-size:14px;letter-spacing:-.02em;
  }
  .ref-bar{
    height:6px;background:rgba(244,237,230,.12);border-radius:99px;
    margin-top:8px;overflow:hidden;
  }
  .ref-bar-fill{
    height:100%;background:var(--lime);border-radius:99px;
    transition:width .3s ease;
  }
  .ref-prog-foot{
    font-size:11px;font-weight:500;color:rgba(244,237,230,.55);
    margin-top:8px;
  }

  /* Invite chip in find-buddies row */
  .invite-chip{
    appearance:none;cursor:pointer;
    background:var(--lime);color:var(--ink);
    border:1.5px solid var(--ink);
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 12px 8px 8px;border-radius:999px;
    font-family:'Inter',sans-serif;font-weight:700;font-size:13px;
  }
  .invite-plus{
    width:22px;height:22px;border-radius:50%;
    background:var(--ink);color:var(--lime);
    display:inline-flex;align-items:center;justify-content:center;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;
    line-height:1;
  }
  .invite-pill{
    background:var(--ink);color:var(--lime);
    padding:2px 8px;border-radius:99px;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:11px;letter-spacing:.02em;
  }

  /* === Group Klaim Sheet === */
  .gk-hero{
    background:var(--ink);color:var(--cream);
    border-radius:20px;padding:18px 18px 16px;
    margin-top:4px;position:relative;overflow:hidden;
  }
  .gk-hero::before{
    content:"";position:absolute;top:-30%;right:-10%;width:55%;height:80%;
    background:radial-gradient(circle, rgba(199,255,79,.25) 0%, transparent 60%);
  }
  .gk-tag{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--lime);font-size:10px;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;
    padding:5px 11px;border:1.5px solid var(--lime);border-radius:999px;
    position:relative;z-index:1;
  }
  .gk-hero h2{color:var(--cream)}
  .gk-meta{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;color:rgba(244,237,230,.75);
    margin-top:6px;flex-wrap:wrap;
  }
  .gk-dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.5}

  .gk-ladder{
    display:grid;grid-template-columns:1fr 1fr;gap:8px;
  }
  .gk-rung{
    border:1.5px solid var(--ink);border-radius:14px;
    padding:10px 12px;display:flex;align-items:center;gap:10px;
    background:var(--white);position:relative;opacity:.5;
  }
  .app.dark .gk-rung{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .gk-rung.on{opacity:1;background:var(--lime);border-color:var(--ink)}
  .app.dark .gk-rung.on{background:var(--lime);color:var(--ink)}
  .gk-rung.next{opacity:1;border-style:dashed;border-color:var(--pink)}
  .gk-rung-n{
    flex:none;width:30px;height:30px;border-radius:50%;
    background:var(--ink);color:var(--lime);
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .gk-rung.on .gk-rung-n{background:var(--ink);color:var(--lime)}
  .gk-rung-info{flex:1;min-width:0}
  .gk-rung-lab{
    font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);
  }
  .gk-rung.on .gk-rung-lab{color:var(--ink);opacity:.7}
  .gk-rung-amt{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:18px;letter-spacing:-.03em;line-height:1;color:var(--ink);
    margin-top:2px;
  }
  .app.dark .gk-rung:not(.on) .gk-rung-amt{color:var(--cream)}
  .gk-check{
    flex:none;color:var(--ink);
  }
  .gk-next-pill{
    flex:none;background:var(--pink);color:var(--ink);
    border:1.5px solid var(--ink);
    padding:2px 8px;border-radius:99px;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11px;
  }
  .gk-nudge{
    margin-top:10px;font-size:13px;font-weight:500;
    color:var(--muted);text-align:center;line-height:1.4;
  }
  .app.dark .gk-nudge{color:rgba(244,237,230,.7)}
  .gk-nudge b{color:var(--ink);font-family:'Bricolage Grotesque',sans-serif;font-weight:700}
  .app.dark .gk-nudge b{color:var(--cream)}
  .gk-hl{background:var(--lime);color:var(--ink);padding:0 6px;border-radius:5px;font-weight:700}

  .gk-squad{
    display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
    padding-bottom:4px;
  }
  .gk-squad::-webkit-scrollbar{display:none}
  .gk-member{
    flex:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    width:78px;
  }
  .gk-mn{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:12px;letter-spacing:-.02em;
  }
  .gk-status{
    font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    padding:2px 6px;border-radius:99px;
  }
  .gk-status.host{background:var(--lime);color:var(--ink)}
  .gk-status.in{background:var(--ink);color:var(--lime)}
  .app.dark .gk-status.in{background:var(--lime);color:var(--ink)}
  .gk-status.invited{background:transparent;color:var(--muted);border:1px dashed var(--muted)}

  .gk-cta-stack{display:flex;flex-direction:column;gap:8px;margin-top:18px}
  .gk-tap{padding:16px;font-size:15px}

  .gk-rally{
    display:flex;flex-wrap:wrap;gap:6px;
  }
  .gk-rally-chip{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:8px;
    padding:6px 12px 6px 6px;border-radius:99px;
    border:1.5px solid var(--ink);background:var(--white);color:var(--ink);
    font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
  }
  .app.dark .gk-rally-chip{background:#1a0e2a;color:var(--cream);border-color:rgba(199,255,79,.3)}
  .gk-rally-chip.on{background:var(--lime);color:var(--ink);border-color:var(--ink)}
  .gk-rally-mark{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:14px;width:18px;height:18px;border-radius:50%;
    background:var(--ink);color:var(--lime);
    display:inline-flex;align-items:center;justify-content:center;line-height:1;
  }
  .gk-rally-chip.on .gk-rally-mark{background:var(--ink);color:var(--lime)}

  .gk-chat{
    background:var(--cream-2);border:1.5px solid var(--ink);border-radius:16px;
    padding:12px;display:flex;flex-direction:column;gap:8px;
    max-height:180px;overflow-y:auto;
  }
  .app.dark .gk-chat{background:#1a0e2a;border-color:rgba(199,255,79,.2)}
  .gk-msg{display:flex;gap:8px;align-items:flex-end}
  .gk-msg.me{flex-direction:row-reverse}
  .gk-bubble{
    background:var(--white);border:1.5px solid var(--ink);
    border-radius:14px;padding:8px 12px;
    font-size:13px;line-height:1.4;max-width:78%;
  }
  .app.dark .gk-bubble{background:#251339;border-color:rgba(199,255,79,.2);color:var(--cream)}
  .gk-msg.me .gk-bubble{background:var(--lime);color:var(--ink);border-color:var(--ink)}
  .gk-who{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;
    font-size:11px;color:var(--muted);margin-bottom:1px;letter-spacing:-.01em;
  }
  .gk-input{
    display:flex;gap:8px;margin-top:10px;
  }
  .gk-input input{
    flex:1;padding:12px 14px;border:1.5px solid var(--ink);border-radius:14px;
    background:var(--white);color:var(--ink);
    font-family:'Inter',sans-serif;font-size:13px;font-weight:500;outline:none;
  }
  .app.dark .gk-input input{background:#1a0e2a;border-color:rgba(199,255,79,.3);color:var(--cream)}
  .gk-input input::placeholder{color:var(--muted)}
  .gk-send{
    appearance:none;cursor:pointer;border:1.5px solid var(--ink);
    background:var(--ink);color:var(--lime);
    padding:12px 18px;border-radius:14px;
    font-family:'Inter',sans-serif;font-weight:700;font-size:13px;
  }

  .gk-locked{
    margin-top:18px;background:var(--ink);color:var(--cream);
    border:1.5px solid var(--ink);border-radius:18px;padding:14px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .gk-locked-amt{
    font-family:'Bricolage Grotesque',sans-serif;font-weight:800;
    font-size:30px;color:var(--lime);letter-spacing:-.04em;line-height:.85;
  }
  .gk-locked-lab{
    font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(244,237,230,.6);margin-top:4px;text-align:right;
  }

  /* Photo with real image */
  .photo.has-img { background: var(--cream-3); }
  .app.dark .photo.has-img { background: #251339; }
  .photo.has-img::after { content: none; }
  .cur-photo { overflow: hidden; }
  .detail-hero { overflow: hidden; }

  /* Tweaks panel link override */
  .tweaks-host{position:fixed}
</style>
</head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
